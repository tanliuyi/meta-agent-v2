appId: com.meta-agent.desktop
productName: Meta Agent
asar: true
directories:
  buildResources: build
  output: output/installers
files:
  - out/**/*
  - package.json
asarUnpack:
  - out/sidecar/**/*
  - node_modules/**/*
extraResources:
  - from: output/pi-sidecar/runtime-manifest.json
    to: pi-sidecar/runtime-manifest.json
  - from: src/main/pi/extensions/pi-hermes-memory/LICENSE
    to: licenses/pi-hermes-memory.LICENSE
  - from: src/main/pi/extensions/pi-subagents/LICENSE
    to: licenses/pi-subagents.LICENSE
afterPack: ../../scripts/validate-desktop-package.mjs
afterSign: ../../scripts/validate-desktop-signing.mjs
mac:
  icon: build/icon.png
  artifactName: meta-agent-desktop-${version}-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  artifactName: meta-agent-desktop-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  icon: build/icon.png
  executableName: meta-agent-desktop
  artifactName: meta-agent-desktop-${version}-${arch}.${ext}
  category: Development
  target:
    - AppImage
    - deb
appImage:
  artifactName: meta-agent-desktop-${version}.${ext}
npmRebuild: false
buildDependenciesFromSource: false
publish:
  provider: github
  owner: tanliuyi
  repo: meta-agent-harness
  releaseType: release
