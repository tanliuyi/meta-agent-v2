appId: works.earendil.pi.desktop
productName: pi desktop
asar: true
directories:
  buildResources: build
  output: output/installers
files:
  - out/**/*
  - package.json
asarUnpack:
  - out/sidecar/**/*
  - node_modules/**/*
extraResources:
  - from: output/pi-sidecar/runtime-manifest.json
    to: pi-sidecar/runtime-manifest.json
afterPack: ../../scripts/validate-desktop-package.mjs
afterSign: ../../scripts/validate-desktop-signing.mjs
mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
linux:
  icon: build/icon.png
  category: Development
  target:
    - AppImage
    - deb
npmRebuild: false
buildDependenciesFromSource: false
publish:
  provider: github
  owner: tanliuyi
  repo: meta-agent-harness
  releaseType: release
